name: Rust CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            can-run-tests: true
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            can-run-tests: false
          - os: macos-latest
            target: aarch64-apple-darwin
            can-run-tests: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            can-run-tests: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            can-run-tests: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ./rust/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Setup MSVC developer command prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Build (default)
        working-directory: ./rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (vendored - static)
        working-directory: ./rust
        run: cargo build --release --target ${{ matrix.target }} -p libefex-sys --features vendored

      - name: Build (vendored-shared - dynamic)
        working-directory: ./rust
        run: cargo build --release --target ${{ matrix.target }} -p libefex-sys --features vendored-shared

      - name: Check libusb output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $profile = "release"
          $dllPath = "rust/target/$target/$profile/libusb-1.0.dll"
          $minSize = 50000
          
          if (Test-Path $dllPath) {
            $fileInfo = Get-Item $dllPath
            $size = $fileInfo.Length
            Write-Host "✓ libusb-1.0.dll found at: $dllPath"
            Write-Host "  Size: $size bytes"
            
            if ($size -lt $minSize) {
              Write-Host "✗ ERROR: DLL size ($size bytes) is too small (minimum: $minSize bytes)"
              Write-Host "  The DLL may be corrupted or incomplete"
              exit 1
            }
            Write-Host "✓ DLL size check passed ($size >= $minSize bytes)"
          } else {
            Write-Host "✗ ERROR: libusb-1.0.dll not found!"
            Write-Host "  Expected path: $dllPath"
            Write-Host "  vendored-shared feature requires dynamic library output"
            exit 1
          }

      - name: Check libusb output (macOS)
        if: runner.os == 'macOS'
        run: |
          target="${{ matrix.target }}"
          profile="release"
          dylibPath="rust/target/$target/$profile/libusb-1.0.dylib"
          minSize=50000
          
          if [ -f "$dylibPath" ]; then
            size=$(stat -f%z "$dylibPath")
            echo "✓ libusb-1.0.dylib found at: $dylibPath"
            echo "  Size: $size bytes"
            ls -la "$dylibPath"
            file "$dylibPath"
            
            if [ "$size" -lt "$minSize" ]; then
              echo "✗ ERROR: dylib size ($size bytes) is too small (minimum: $minSize bytes)"
              echo "  The dylib may be corrupted or incomplete"
              exit 1
            fi
            echo "✓ dylib size check passed ($size >= $minSize bytes)"
          else
            echo "✗ ERROR: libusb-1.0.dylib not found!"
            echo "  Expected path: $dylibPath"
            echo "  vendored-shared feature requires dynamic library output"
            exit 1
          fi

      - name: Check libusb output (Linux)
        if: runner.os == 'Linux'
        run: |
          target="${{ matrix.target }}"
          profile="release"
          soPath="rust/target/$target/$profile/libusb-1.0.so"
          minSize=50000
          
          if [ -f "$soPath" ]; then
            size=$(stat -c%s "$soPath")
            echo "✓ libusb-1.0.so found at: $soPath"
            echo "  Size: $size bytes"
            ls -la "$soPath"
            file "$soPath"
            
            if [ "$size" -lt "$minSize" ]; then
              echo "✗ ERROR: .so size ($size bytes) is too small (minimum: $minSize bytes)"
              echo "  The shared library may be corrupted or incomplete"
              exit 1
            fi
            echo "✓ .so size check passed ($size >= $minSize bytes)"
          else
            echo "✗ ERROR: libusb-1.0.so not found!"
            echo "  Expected path: $soPath"
            echo "  vendored-shared feature requires dynamic library output"
            exit 1
          fi

      - name: Check
        working-directory: ./rust
        run: cargo check --release --target ${{ matrix.target }}

      - name: Build tests
        working-directory: ./rust
        run: cargo test --release --target ${{ matrix.target }} --no-run

      - name: Run tests
        if: ${{ matrix.can-run-tests }}
        working-directory: ./rust
        run: cargo test --release --target ${{ matrix.target }}

  feature-matrix:
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        features:
          - ""
          - "vendored"
          - "vendored-shared"
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ./rust/target
          key: ${{ runner.os }}-${{ matrix.target }}-feature-${{ matrix.features }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-feature-cargo-

      - name: Setup MSVC developer command prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Build with features (Windows)
        if: runner.os == 'Windows'
        working-directory: ./rust
        shell: pwsh
        run: |
          $features = "${{ matrix.features }}"
          if ([string]::IsNullOrEmpty($features)) {
            Write-Host "Building without features (default mode)"
            cargo build --release --target ${{ matrix.target }} -p libefex-sys
          } else {
            Write-Host "Building with features: $features"
            cargo build --release --target ${{ matrix.target }} -p libefex-sys --features $features
          }

      - name: Build with features (Unix)
        if: runner.os != 'Windows'
        working-directory: ./rust
        run: |
          FEATURES="${{ matrix.features }}"
          if [ -z "$FEATURES" ]; then
            echo "Building without features (default mode)"
            cargo build --release --target ${{ matrix.target }} -p libefex-sys
          else
            echo "Building with features: $FEATURES"
            cargo build --release --target ${{ matrix.target }} -p libefex-sys --features "$FEATURES"
          fi

      - name: Verify build artifacts (Windows)
        if: runner.os == 'Windows'
        working-directory: ./rust
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $profile = "release"
          $outDir = "target/$target/$profile"
          $features = "${{ matrix.features }}"
          $minSize = 50000
          
          Write-Host "=== Build artifacts in $outDir ==="
          
          $dllPath = "$outDir/libusb-1.0.dll"
          if (Test-Path $dllPath) {
            $fileInfo = Get-Item $dllPath
            $size = $fileInfo.Length
            Write-Host "✓ libusb-1.0.dll found (dynamic linking)"
            Write-Host "  Size: $size bytes"
            
            if ($features -eq "vendored-shared") {
              if ($size -lt $minSize) {
                Write-Host "✗ ERROR: DLL size ($size bytes) is too small (minimum: $minSize bytes)"
                Write-Host "  The DLL may be corrupted or incomplete"
                exit 1
              }
              Write-Host "✓ DLL size check passed ($size >= $minSize bytes)"
            }
          } else {
            if ($features -eq "vendored-shared") {
              Write-Host "✗ ERROR: vendored-shared requires DLL output!"
              exit 1
            }
            Write-Host "✓ Static linking mode (no DLL)"
          }
          
          Write-Host "=== libefex static library ==="
          Get-ChildItem -Path target -Include "*.a","*.lib" -Recurse | Select-Object -First 20

      - name: Verify build artifacts (Unix)
        if: runner.os != 'Windows'
        working-directory: ./rust
        run: |
          target="${{ matrix.target }}"
          profile="release"
          outDir="target/$target/$profile"
          features="${{ matrix.features }}"
          minSize=50000
          
          echo "=== Build artifacts in $outDir ==="
          
          if [ "${{ runner.os }}" = "macOS" ]; then
            dylibPath="$outDir/libusb-1.0.dylib"
            if [ -f "$dylibPath" ]; then
              size=$(stat -f%z "$dylibPath")
              echo "✓ libusb-1.0.dylib found (dynamic linking)"
              echo "  Size: $size bytes"
              ls -la "$dylibPath"
              
              if [ "$features" = "vendored-shared" ]; then
                if [ "$size" -lt "$minSize" ]; then
                  echo "✗ ERROR: dylib size ($size bytes) is too small (minimum: $minSize bytes)"
                  exit 1
                fi
                echo "✓ dylib size check passed ($size >= $minSize bytes)"
              fi
            else
              if [ "$features" = "vendored-shared" ]; then
                echo "✗ ERROR: vendored-shared requires dylib output!"
                exit 1
              fi
              echo "✓ Static linking mode (no dylib)"
            fi
          elif [ "${{ runner.os }}" = "Linux" ]; then
            soPath="$outDir/libusb-1.0.so"
            if [ -f "$soPath" ]; then
              size=$(stat -c%s "$soPath")
              echo "✓ libusb-1.0.so found (dynamic linking)"
              echo "  Size: $size bytes"
              ls -la "$soPath"
              
              if [ "$features" = "vendored-shared" ]; then
                if [ "$size" -lt "$minSize" ]; then
                  echo "✗ ERROR: .so size ($size bytes) is too small (minimum: $minSize bytes)"
                  exit 1
                fi
                echo "✓ .so size check passed ($size >= $minSize bytes)"
              fi
            else
              if [ "$features" = "vendored-shared" ]; then
                echo "✗ ERROR: vendored-shared requires .so output!"
                exit 1
              fi
              echo "✓ Static linking mode (no .so)"
            fi
          fi
          
          echo "=== libefex static library ==="
          find target -name "*.a" 2>/dev/null | head -20

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        working-directory: ./rust
        shell: pwsh
        run: |
          $features = "${{ matrix.features }}"
          if ([string]::IsNullOrEmpty($features)) {
            cargo test --release --target ${{ matrix.target }} -p libefex-sys
          } else {
            cargo test --release --target ${{ matrix.target }} -p libefex-sys --features $features
          }

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        working-directory: ./rust
        run: |
          FEATURES="${{ matrix.features }}"
          if [ -z "$FEATURES" ]; then
            cargo test --release --target ${{ matrix.target }} -p libefex-sys
          else
            cargo test --release --target ${{ matrix.target }} -p libefex-sys --features "$FEATURES"
          fi
