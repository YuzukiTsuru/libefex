name: Rust CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ./rust/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Setup MSVC developer command prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Build
        working-directory: ./rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Check libusb output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $profile = "release"
          $dllPath = "rust/target/$target/$profile/libusb-1.0.dll"
          
          if (Test-Path $dllPath) {
            Write-Host "✓ libusb-1.0.dll found at: $dllPath"
            $fileInfo = Get-Item $dllPath
            Write-Host "  Size: $($fileInfo.Length) bytes"
          } else {
            Write-Host "⚠ libusb-1.0.dll not found (static linking fallback)"
            Write-Host "  Expected path: $dllPath"
          }

      - name: Check libusb output (macOS)
        if: runner.os == 'macOS'
        run: |
          target="${{ matrix.target }}"
          profile="release"
          dylibPath="rust/target/$target/$profile/libusb-1.0.dylib"
          
          if [ -f "$dylibPath" ]; then
            echo "✓ libusb-1.0.dylib found at: $dylibPath"
            ls -la "$dylibPath"
            file "$dylibPath"
          else
            echo "⚠ libusb-1.0.dylib not found (static linking fallback)"
            echo "  Expected path: $dylibPath"
          fi

      - name: Check
        working-directory: ./rust
        run: cargo check --release --target ${{ matrix.target }}

      - name: Run tests
        working-directory: ./rust
        run: cargo test --release --target ${{ matrix.target }}
