name: Rust CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            can-run-tests: true
            cross-compile: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            can-run-tests: false
            cross-compile: true
          - os: macos-latest
            target: aarch64-apple-darwin
            can-run-tests: true
            cross-compile: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            can-run-tests: true
            cross-compile: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            can-run-tests: false
            cross-compile: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            can-run-tests: true
            cross-compile: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ./rust/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install dependencies on Ubuntu (native)
        if: runner.os == 'Linux' && matrix.cross-compile == false
        run: sudo apt-get update && sudo apt-get install -y libudev-dev cmake

      - name: Install cross-compilation toolchain (Linux aarch64)
        if: runner.os == 'Linux' && matrix.target == 'aarch64-unknown-linux-gnu' && matrix.cross-compile == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu cmake

      - name: Configure cross-compilation environment
        if: runner.os == 'Linux' && matrix.cross-compile == true
        run: |
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install CMake on Windows
        if: runner.os == 'Windows'
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'

      - name: Build
        working-directory: ./rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Check libusb output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $profile = "release"
          $dllPath = "rust/target/$target/$profile/libusb-1.0.dll"
          $minSize = 50000
          
          if (Test-Path $dllPath) {
            $fileInfo = Get-Item $dllPath
            $size = $fileInfo.Length
            Write-Host "✓ libusb-1.0.dll found at: $dllPath"
            Write-Host "  Size: $size bytes"
            
            if ($size -lt $minSize) {
              Write-Host "✗ ERROR: DLL size ($size bytes) is too small (minimum: $minSize bytes)"
              Write-Host "  The DLL may be corrupted or incomplete"
              exit 1
            }
            Write-Host "✓ DLL size check passed ($size >= $minSize bytes)"
          } else {
            Write-Host "✗ ERROR: libusb-1.0.dll not found!"
            Write-Host "  Expected path: $dllPath"
            exit 1
          }

      - name: Check libusb output (macOS)
        if: runner.os == 'macOS'
        run: |
          target="${{ matrix.target }}"
          profile="release"
          dylibPath="rust/target/$target/$profile/libusb-1.0.dylib"
          minSize=50000
          
          if [ -f "$dylibPath" ]; then
            size=$(stat -f%z "$dylibPath")
            echo "✓ libusb-1.0.dylib found at: $dylibPath"
            echo "  Size: $size bytes"
            ls -la "$dylibPath"
            file "$dylibPath"
            
            if [ "$size" -lt "$minSize" ]; then
              echo "✗ ERROR: dylib size ($size bytes) is too small (minimum: $minSize bytes)"
              echo "  The dylib may be corrupted or incomplete"
              exit 1
            fi
            echo "✓ dylib size check passed ($size >= $minSize bytes)"
          else
            echo "✗ ERROR: libusb-1.0.dylib not found!"
            echo "  Expected path: $dylibPath"
            exit 1
          fi

      - name: Check libusb output (Linux - native)
        if: runner.os == 'Linux' && matrix.cross-compile == false
        run: |
          target="${{ matrix.target }}"
          profile="release"
          soPath="rust/target/$target/$profile/libusb-1.0.so"
          minSize=50000
          
          if [ -f "$soPath" ]; then
            size=$(stat -c%s "$soPath")
            echo "✓ libusb-1.0.so found at: $soPath"
            echo "  Size: $size bytes"
            ls -la "$soPath"
            file "$soPath"
            
            if [ "$size" -lt "$minSize" ]; then
              echo "✗ ERROR: .so size ($size bytes) is too small (minimum: $minSize bytes)"
              echo "  The shared library may be corrupted or incomplete"
              exit 1
            fi
            echo "✓ .so size check passed ($size >= $minSize bytes)"
          else
            echo "✗ ERROR: libusb-1.0.so not found!"
            echo "  Expected path: $soPath"
            exit 1
          fi

      - name: Check libusb output (Linux - cross)
        if: runner.os == 'Linux' && matrix.cross-compile == true
        run: |
          echo "Cross-compilation detected, using static linking"
          echo "✓ Static library linked successfully"

      - name: Check
        working-directory: ./rust
        run: cargo check --release --target ${{ matrix.target }}

      - name: Build tests
        working-directory: ./rust
        run: cargo test --release --target ${{ matrix.target }} --no-run

      - name: Run tests
        if: ${{ matrix.can-run-tests }}
        working-directory: ./rust
        run: cargo test --release --target ${{ matrix.target }}
