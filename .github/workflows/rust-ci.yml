name: Rust CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            can-run-tests: true
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            can-run-tests: false
          - os: macos-latest
            target: aarch64-apple-darwin
            can-run-tests: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            can-run-tests: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            can-run-tests: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ./rust/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Setup MSVC developer command prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Build (default)
        working-directory: ./rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (vendored - static)
        working-directory: ./rust
        run: cargo build --release --target ${{ matrix.target }} -p libefex-sys --features vendored

      - name: Build (vendored-shared - dynamic)
        working-directory: ./rust
        run: cargo build --release --target ${{ matrix.target }} -p libefex-sys --features vendored-shared

      - name: Check libusb output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $profile = "release"
          $dllPath = "rust/target/$target/$profile/libusb-1.0.dll"
          
          if (Test-Path $dllPath) {
            Write-Host "✓ libusb-1.0.dll found at: $dllPath"
            $fileInfo = Get-Item $dllPath
            Write-Host "  Size: $($fileInfo.Length) bytes"
          } else {
            Write-Host "⚠ libusb-1.0.dll not found (static linking fallback)"
            Write-Host "  Expected path: $dllPath"
          }

      - name: Check libusb output (macOS)
        if: runner.os == 'macOS'
        run: |
          target="${{ matrix.target }}"
          profile="release"
          dylibPath="rust/target/$target/$profile/libusb-1.0.dylib"
          
          if [ -f "$dylibPath" ]; then
            echo "✓ libusb-1.0.dylib found at: $dylibPath"
            ls -la "$dylibPath"
            file "$dylibPath"
          else
            echo "⚠ libusb-1.0.dylib not found (static linking fallback)"
            echo "  Expected path: $dylibPath"
          fi

      - name: Check libusb output (Linux)
        if: runner.os == 'Linux'
        run: |
          target="${{ matrix.target }}"
          profile="release"
          soPath="rust/target/$target/$profile/libusb-1.0.so"
          
          if [ -f "$soPath" ]; then
            echo "✓ libusb-1.0.so found at: $soPath"
            ls -la "$soPath"
            file "$soPath"
          else
            echo "⚠ libusb-1.0.so not found (static linking fallback)"
            echo "  Expected path: $soPath"
          fi

      - name: Check
        working-directory: ./rust
        run: cargo check --release --target ${{ matrix.target }}

      - name: Build tests
        working-directory: ./rust
        run: cargo test --release --target ${{ matrix.target }} --no-run

      - name: Run tests
        if: ${{ matrix.can-run-tests }}
        working-directory: ./rust
        run: cargo test --release --target ${{ matrix.target }}

  feature-matrix:
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        features:
          - ""
          - "vendored"
          - "vendored-shared"
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ./rust/target
          key: ${{ runner.os }}-${{ matrix.target }}-feature-${{ matrix.features }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-feature-cargo-

      - name: Setup MSVC developer command prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Build with features (Windows)
        if: runner.os == 'Windows'
        working-directory: ./rust
        shell: pwsh
        run: |
          $features = "${{ matrix.features }}"
          if ([string]::IsNullOrEmpty($features)) {
            Write-Host "Building without features (default mode)"
            cargo build --release --target ${{ matrix.target }} -p libefex-sys
          } else {
            Write-Host "Building with features: $features"
            cargo build --release --target ${{ matrix.target }} -p libefex-sys --features $features
          }

      - name: Build with features (Unix)
        if: runner.os != 'Windows'
        working-directory: ./rust
        run: |
          FEATURES="${{ matrix.features }}"
          if [ -z "$FEATURES" ]; then
            echo "Building without features (default mode)"
            cargo build --release --target ${{ matrix.target }} -p libefex-sys
          else
            echo "Building with features: $FEATURES"
            cargo build --release --target ${{ matrix.target }} -p libefex-sys --features "$FEATURES"
          fi

      - name: Verify build artifacts (Windows)
        if: runner.os == 'Windows'
        working-directory: ./rust
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $profile = "release"
          $outDir = "target/$target/$profile"
          
          Write-Host "=== Build artifacts in $outDir ==="
          
          $dllPath = "$outDir/libusb-1.0.dll"
          if (Test-Path $dllPath) {
            Write-Host "✓ libusb-1.0.dll found (dynamic linking)"
            Get-Item $dllPath | Format-List
          } else {
            Write-Host "✓ Static linking mode (no DLL)"
          }
          
          Write-Host "=== libefex static library ==="
          Get-ChildItem -Path target -Include "*.a","*.lib" -Recurse | Select-Object -First 20

      - name: Verify build artifacts (Unix)
        if: runner.os != 'Windows'
        working-directory: ./rust
        run: |
          target="${{ matrix.target }}"
          profile="release"
          outDir="target/$target/$profile"
          
          echo "=== Build artifacts in $outDir ==="
          
          if [ "${{ runner.os }}" = "macOS" ]; then
            if [ -f "$outDir/libusb-1.0.dylib" ]; then
              echo "✓ libusb-1.0.dylib found (dynamic linking)"
              ls -la "$outDir/libusb-1.0.dylib"
            else
              echo "✓ Static linking mode (no dylib)"
            fi
          elif [ "${{ runner.os }}" = "Linux" ]; then
            if [ -f "$outDir/libusb-1.0.so" ]; then
              echo "✓ libusb-1.0.so found (dynamic linking)"
              ls -la "$outDir/libusb-1.0.so"
            else
              echo "✓ Static linking mode (no .so)"
            fi
          fi
          
          echo "=== libefex static library ==="
          find target -name "*.a" 2>/dev/null | head -20

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        working-directory: ./rust
        shell: pwsh
        run: |
          $features = "${{ matrix.features }}"
          if ([string]::IsNullOrEmpty($features)) {
            cargo test --release --target ${{ matrix.target }} -p libefex-sys
          } else {
            cargo test --release --target ${{ matrix.target }} -p libefex-sys --features $features
          }

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        working-directory: ./rust
        run: |
          FEATURES="${{ matrix.features }}"
          if [ -z "$FEATURES" ]; then
            cargo test --release --target ${{ matrix.target }} -p libefex-sys
          else
            cargo test --release --target ${{ matrix.target }} -p libefex-sys --features "$FEATURES"
          fi
